name: Build iOS (unsigned IPA)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Bagimliliklar
        run: flutter pub get

      - name: Derle (imzasiz)
        run: flutter build ios --release --no-codesign

      - name: Unsigned IPA paketle
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qr bsltest-unsigned.ipa Payload
          ls -la bsltest-unsigned.ipa

      - name: IPA'yi artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: bsltest-unsigned-ipa
          path: build/ios/iphoneos/bsltest-unsigned.ipa
